apiVersion: apps/v1
kind: Deployment
metadata:
  name: meritcap-user
  namespace: prod
  labels:
    app: meritcap-user
spec:
  replicas: 2
  selector:
    matchLabels:
      app: meritcap-user
  template:
    metadata:
      labels:
        app: meritcap-user
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: meritcap-user
          image: ghcr.io/druva-06/meritcap-user:prod-latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: meritcap-user-svc
  namespace: prod
spec:
  selector:
    app: meritcap-user
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
