apiVersion: apps/v1
kind: Deployment
metadata:
  name: meritcap-admin
  namespace: prod
  labels:
    app: meritcap-admin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: meritcap-admin
  template:
    metadata:
      labels:
        app: meritcap-admin
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: meritcap-admin
          image: ghcr.io/druva-06/meritcap-admin:prod-latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: meritcap-admin-svc
  namespace: prod
spec:
  selector:
    app: meritcap-admin
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
