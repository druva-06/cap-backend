version: 0.2

env:
  variables:
    S3_BUCKET_NAME: career-adivce-partner
    S3_JAR_KEY: cap-backend-uat.jar
    EC2_INSTANCE_ID: i-08a40d8c2c9193d3b
    REGION: ap-south-2

phases:
  install:
    commands:
      - echo "Installing jq and AWS CLI tools if missing..."
      - yum install -y jq awscli || apt-get install -y jq awscli

  build:
    commands:
      - echo "Building the Spring Boot application..."
      - mvn clean install
      - echo "Build completed. Listing target/ directory:"
      - ls -lh target/

  post_build:
    commands:
      - echo "Uploading JAR to S3..."
      - aws s3 cp target/*.jar s3://$S3_BUCKET_NAME/$S3_JAR_KEY --region $REGION
      - echo "Triggering SSM Run Command on EC2 instance $EC2_INSTANCE_ID..."
      - |
        aws ssm send-command \
          --instance-ids "$EC2_INSTANCE_ID" \
          --document-name "AWS-RunShellScript" \
          --comment "Deploy latest backend JAR" \
          --parameters 'commands=[
            "aws s3 cp s3://'"$S3_BUCKET_NAME"'/'"$S3_JAR_KEY"' /opt/cap/cap-backend-uat.jar",
            "pkill -f java || true",
            "nohup java -jar /opt/cap/cap-backend-uat.jar > /opt/cap/app.log 2>&1 &"
          ]' \
          --region $REGION
      - echo "Deployment command sent. Monitor execution in SSM console."
